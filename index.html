    <script type="text/javascript">
        setInterval(checkLeads, 15000); 
        function checkLeads() {
            $.getJSON("https://de6jvomfbm0af.cloudfront.net/public/external/check2.php?testing=0&callback=?", 
                function (leads) {
                    var completed_leads = leads.length;
                    if (completed_leads) {
                        var offer_ids = [];
                        var earnings_in_cents = 0;
                        $.each(leads, function (key, lead) {
                            offer_ids.push(parseInt(lead.offer_id));
                            earnings_in_cents += parseFloat(lead.points);
                            console.log("Single lead on offer id " + lead.offer_id + " for  $" + (parseFloat(lead.points) / 100).toFixed(2));
                        });
                        console.log("SUMMARY: User has completed " + completed_leads + " leads, for $" + (earnings_in_cents / 100) + " earnings, on offer ids: " + offer_ids.join(","));
                    }
                });
        }

                                                                                             <style>
    :root {
        --bg-grad-top: #154c25;
        --bg-grad-bot: #2c8c44;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-sub: #64748b;
        --blue-btn: #4f46e5;
        --green-btn: #16a34a;
        --red-btn: #dc2626;
        --light-blue-bg: #eff6ff;
        --faq-bg: #f8fafc;
        --border-color: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    body {
        background: linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg-grad-bot) 100%);
        background-attachment: fixed;
        min-height: 100vh;
        color: var(--text-main);
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        padding-top: 40px;
    }

    .site-wrapper { width: 100%; max-width: 800px; padding: 0 15px; margin: 0 auto; padding-bottom: 50px;}
    .main-content-area { max-width: 450px; margin: 0 auto; position: relative; }

    /* Snowfall Animations */
    #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .snow-flake { position: absolute; width: 35px; opacity: 0.5; top: -50px; }
    
    @keyframes fall {
        0% { top: -50px; opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { top: 110vh; opacity: 0; }
    }
    @keyframes sway {
        0% { transform: translateX(0px) rotate(0deg); }
        50% { transform: translateX(25px) rotate(15deg); }
        100% { transform: translateX(-25px) rotate(-15deg); }
    }

    /* Main Box */
    .main-card { background: var(--card-bg); border-radius: 20px; padding: 30px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; z-index: 1; margin-bottom: 15px; }
    h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 5px; }
    .sub-text { font-size: 14px; color: var(--text-sub); text-align: center; margin-bottom: 20px; }

    /* Reward Box */
    .reward-box { background: var(--light-blue-bg); border-radius: 12px; padding: 20px; text-align: center; position: relative; transition: 0.2s; cursor: pointer; border: 2px solid transparent;}
    .reward-box.selected { border-color: transparent; }
    .reward-icon { width: 80px; margin-bottom: 10px; }
    .reward-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 2px;}
    .reward-box p { font-size: 13px; color: var(--text-sub); }
    .verified-badge { position: absolute; width: 32px; height: 32px; right: -12px; top: -12px; display: none; z-index: 5; }

    /* Inputs & Buttons */
    .input-row { display: flex; gap: 10px; margin-top: 15px; align-items: center; }
    .input-wrapper { flex: 1; position: relative; display: none; }
    .input-wrapper input { width: 100%; padding: 12px 15px 12px 40px; border: 2px solid var(--border-color); border-radius: 10px; font-weight: 600; font-size: 15px; outline: none; }
    .input-wrapper input:focus, .input-wrapper.active input { border-color: var(--blue-btn); }
    .icon-user { position: absolute; left: 12px; top: 12px; color: var(--text-sub); }
    .input-tick { position: absolute; right: 10px; top: 10px; width: 22px; display: none; }

    .btn-next { background: #94a3b8; color: white; border: none; border-radius: 10px; padding: 12px 20px; font-weight: 800; font-size: 16px; cursor: not-allowed; display: none; width: 110px; position: relative;}
    .btn-next.active { background: var(--blue-btn); cursor: pointer; }
    .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Timer Row & Action Buttons */
    .timer-row { display: flex; justify-content: space-between; align-items: flex-end; position: relative; margin-top: -30px; margin-left: 15px; margin-right: 15px; margin-bottom: 25px; z-index: 10;}
    .timer-box { background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%); color: white; padding: 8px 15px; border-radius: 8px; font-weight: 800; font-size: 11px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #f87171; line-height: 1.2; width: max-content; }
    .timer-text { font-size: 16px; }
    .timer-text small { font-size: 11px; }
    
    .action-btns { display: none; gap: 10px; }
    .circle-btn { width: 42px; height: 42px; border-radius: 50%; background: #3b82f6; color: white; border: none; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s;}
    .circle-btn:active { transform: scale(0.9); }

    /* Info Cards (FAQ/Chat) */
    .info-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; }
    .card-title { font-size: 18px; font-weight: 800; display: inline-block; }
    .card-subtitle { font-size: 13px; color: var(--text-sub); }

    .faq-item { background: var(--faq-bg); border: 1px solid var(--border-color); border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .faq-q { padding: 12px; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .faq-a { padding: 0 12px; font-size: 13px; color: var(--text-sub); line-height: 1.5; max-height: 0; overflow: hidden; transition: 0.3s ease; }
    .faq-item.open .faq-a { padding-bottom: 12px; max-height: 200px; }

    .chat-header { display: flex; justify-content: space-between; align-items: center; }
    .online-status { font-size: 13px; color: var(--text-sub); font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; background: var(--green-btn); border-radius: 50%; }
    .chat-box { height: 220px; overflow: hidden; background: var(--faq-bg); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; scroll-behavior: smooth; }
    .chat-msg { background: white; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); word-wrap: break-word; }
    .chat-user { font-weight: 700; }
    .chat-input-area { margin-top: 10px; position: relative; }
    .chat-input-area input { width: 100%; padding: 12px 35px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--faq-bg); font-weight: 600;}
    .send-icon, .lock-icon { position: absolute; top: 12px; color: var(--text-sub); }
    .send-icon { left: 12px; }
    .lock-icon { right: 12px; }

    /* Page 2 Styles */
    .avatar-lg { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--border-color); margin: 0 auto; display: block; object-fit: cover;}
    .confirm-name { text-align: center; color: var(--blue-btn); font-weight: 800; font-size: 18px; margin-top: 10px; }
    .confirm-handle { text-align: center; color: var(--text-sub); font-size: 14px; margin-bottom: 20px; }
    .btn-row { display: flex; gap: 10px; }
    .btn-yes, .btn-no { flex: 1; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: 800; font-size: 16px; cursor: pointer; }
    .btn-no { background: var(--red-btn); }
    .btn-yes { background: var(--green-btn); }

    /* Page 3 Styles & Offer Modifiers */
    .offer-btn { 
        display: flex; justify-content: center; align-items: center; 
        background: var(--green-btn); color: white; text-decoration: none; 
        padding: 18px 30px; border-radius: 10px; font-weight: 700; font-size: 14px; 
        margin-bottom: 10px; position: relative; text-align: center; overflow: hidden;
    }
    .empty-slot { border: 2px dashed #cbd5e1; border-radius: 10px; height: 55px; margin-bottom: 10px; }
    
    /* Dynamic Offer Additions */
    .offer-info-icon { position: absolute; right: 8px; bottom: 8px; background: rgba(0,0,0,0.3); border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold;}
    .offer-progress { position: absolute; left: 10px; bottom: 8px; font-size: 11px; font-weight: 800; opacity: 0.9;}
    .offer-mini-spinner { position: absolute; right: 10px; top: 10px; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
                        </style>
                        <script type="text/javascript">
        const imgRobux = "https://i.ibb.co/1J2Fj29X/20260509-102354.png";
    const imgAvatar = "https://i.ibb.co/278NchjW/images-2.jpg";
    const imgTick = "https://i.ibb.co/dsb8SkGN/20260509-102535.png";
    const imgRain = "https://i.ibb.co/DHQp08HQ/20260509-102326.png";

    let userName = "";

    $(function() {
        setInterval(spawnSnowflake, 1000); // 1 direct Robux per second
        renderFaq();
        startLiveChat(); 
        loadStep1();
        
        setInterval(() => {
            let sec = parseInt($('#seconds').text());
            sec = sec > 0 ? sec - 1 : 59;
            $('#seconds').text(sec < 10 ? '0'+sec : sec);
        }, 1000);
    });

    // --- Snowfall Direct Image Spawner ---
    function spawnSnowflake() {
        let drop = $(`<img src="${imgRain}" class="snow-flake">`);
        
        let fallDuration = Math.random() * 5 + 10; 
        let swayDuration = Math.random() * 2 + 2;  
        
        drop.css({ 
            left: (Math.random() * 95) + '%', 
            animationName: 'fall, sway',
            animationDuration: `${fallDuration}s, ${swayDuration}s`,
            animationTimingFunction: 'linear, ease-in-out',
            animationIterationCount: 'forwards, infinite',
            animationDirection: 'normal, alternate'
        });
        
        $('#rain-container').append(drop);
        
        setTimeout(() => { drop.remove(); }, fallDuration * 1000);
    }

    // --- Global Event Listeners ---
    $(document).on('click', '#btn-no', function() { loadStep1(); });
    $(document).on('click', '#btn-yes', function() { loadStep3(); });
    $(document).on('click', '#btn-back-step', function() { loadStep1(); });
    $(document).on('click', '#btn-refresh-offers', function() { loadStep3(); });

    // --- STEP 1 ---
    function loadStep1() {
        $('#step3-actions').hide(); 

        let html = `
            <div class="main-card" id="card-1">
                <h1>🎁 Choose Your Reward</h1>
                <div class="sub-text">What will you claim today?</div>
                
                <div class="reward-box" id="reward-select">
                    <img src="${imgTick}" class="verified-badge" id="reward-tick">
                    <img src="${imgRobux}" class="reward-icon">
                    <h2>1,000 Robux</h2>
                    <p>A giftcard for 1,000 Robux!</p>
                </div>

                <div class="input-row">
                    <div class="input-wrapper" id="user-input-box">
                        <span class="icon-user">👤</span>
                        <input type="text" id="username" placeholder="Your Roblox Username.." value="${userName}">
                        <img src="${imgTick}" class="input-tick" id="input-tick">
                    </div>
                    <button class="btn-next" id="btn-next">
                        <span class="btn-text">Next ⏩</span>
                        <div class="spinner"></div>
                    </button>
                </div>
            </div>
        `;
        $('#dynamic-content').html(html);

        if(userName.length > 2) {
            $('#reward-select').addClass('selected');
            $('#reward-tick').show();
            $('#user-input-box').css('display', 'block').addClass('active');
            $('#input-tick').show();
            $('#btn-next').css('display', 'block').addClass('active').prop('disabled', false);
        }

        // Toggle Selection Logic
        $('#reward-select').click(function() {
            $(this).toggleClass('selected');
            if($(this).hasClass('selected')) {
                $('#reward-tick').show();
                $('#user-input-box').css('display', 'block');
                $('#btn-next').css('display', 'block'); // Instantly show the button when box is selected
                
                if($('#username').val().trim().length > 2) {
                    $('#btn-next').addClass('active').prop('disabled', false);
                } else {
                    $('#btn-next').removeClass('active').prop('disabled', true);
                }
            } else {
                $('#reward-tick').hide();
                $('#user-input-box').css('display', 'none');
                $('#btn-next').css('display', 'none');
            }
        });

        $('#username').on('input', function() {
            userName = $(this).val().trim();
            if(userName.length > 2) {
                $('#user-input-box').addClass('active');
                $('#input-tick').show();
                $('#btn-next').addClass('active').prop('disabled', false);
            } else {
                $('#user-input-box').removeClass('active');
                $('#input-tick').hide();
                $('#btn-next').removeClass('active').prop('disabled', true);
            }
        });

        $('#btn-next').click(function() {
            if(!$(this).hasClass('active')) return;
            $('.btn-text').hide();
            $('.spinner').show();
            setTimeout(loadStep2, 1000);
        });
    }

    // --- STEP 2 ---
    function loadStep2() {
        $('#step3-actions').hide();

        let html = `
            <div class="main-card">
                <h1><img src="${imgTick}" style="width:20px; vertical-align:middle;"> Confirm Your Profile</h1>
                <div class="sub-text">Is this your Roblox account?</div>
                
                <img src="${imgAvatar}" class="avatar-lg">
                <div class="confirm-name">↗ ${userName}</div>
                <div class="confirm-handle">@${userName}</div>

                <div class="btn-row">
                    <button class="btn-no" id="btn-no">👎 No</button>
                    <button class="btn-yes" id="btn-yes">👍 Yes!</button>
                </div>
            </div>
        `;
        $('#dynamic-content').html(html);
    }
                        </script>
                        <script type="text/javascript">
    // --- STEP 3: API Logic ---
    function loadStep3() {
        $('#step3-actions').css('display', 'flex'); // Show Back/Refresh buttons

        let html = `
            <div class="main-card">
                <h1>Complete One Quest</h1>
                <div class="sub-text">Choose and complete just 1 quest below to receive <b>1,000 Robux</b> - If one doesn't work, try another!</div>
                
                <div id="offerContainer">
                    </div>
            </div>
        `;
        $('#dynamic-content').html(html);

        $.getJSON("https://de6jvomfbm0af.cloudfront.net/public/offers/feed.php?user_id=779217&api_key=45665e45f6e0cc2e67c90724cfedcfe8&s1=&s2=&callback=?",
            function(offers){
                var offerHtml = '';
                var maxOffers = 5; 
                
                var actualOffers = (offers && offers.length) ? offers.slice(0, maxOffers) : [];
                
                $.each(actualOffers, function(key, offer){
                    offerHtml += `<a href="${offer.url}" target="_blank" class="offer-btn" title="${offer.conversion}">
                                    <span>${offer.anchor}</span> 
                                    <div class="offer-info-icon">i</div>
                                  </a>`;
                });
                
                var missingSlots = maxOffers - actualOffers.length;
                for(let i=0; i < missingSlots; i++) {
                    offerHtml += `<div class="empty-slot"></div>`;
                }

                $("#offerContainer").html(offerHtml);
            });
    }

    // Interactive Offer Checker (Adds 10% and Spinner on click)
    $(document).on('click', '.offer-btn', function() {
        if($(this).find('.offer-progress').length === 0) {
            $(this).append('<div class="offer-progress">10%</div><div class="offer-mini-spinner"></div>');
        }
    });

    // --- FAQ Logic ---
    function renderFaq() {
        const faqs = [
            {q: "🤔 How do I use this?", a: "Select a reward, enter your Roblox username, and complete one of the quests."},
            {q: "🎁 How do I receive my prize?", a: "Your prize is delivered to you via a Roblox giftcard."},
            {q: "📝 What if I can't complete a quest?", a: "If you're having trouble with a quest, please disable your AdBlocker ⛔. If you have one as they block our quest link. If that doesn't help, try another quest. (you only need to complete one). If none works then visit the site on another device 📱🖥️ (phone/tablet/pc/laptop) to ger different quests, or try again tomorrow."},
            {q: "🪙 Why do I have to do a quest?", a: "Our site is funded by our partners - by completing their quests, you help us afford to give rewards to everyone."},
            {q: "🔢 Can I claim more than once?", a: "Yes, you can claim as many times as you want! however, keep in mind that a quest might now work again if you've done it already"},
            {q: "🔒 Is this an official Roblox website?", a: "No - we are not affiliated with or sponsored by Roblox. We are a group of Roblox Developers, Content Creators and enthusiasts working to make Roblox players happy. ❤️"}
        ];
        let h = '';
        faqs.forEach(f => {
            h += `<div class="faq-item"><div class="faq-q">${f.q} <span>⌄</span></div><div class="faq-a">${f.a}</div></div>`;
        });
        $('#faq-list').html(h);
        
        $('.faq-q').click(function(){
            let parent = $(this).parent();
            $('.faq-item').not(parent).removeClass('open');
            parent.toggleClass('open');
        });
    }

    // --- Live Chat Logic ---
    function startLiveChat() {
        const names = ["Extra_noobie123", "dkdhdyi93", "quayShawn27", "Hockey28Mcdavid", "kauaqwszxd", "jsa101113", "Styxxvxx4", "Bdrbigb", "OCEAN_galla", "Julius33077", "Luis_TZ78", "kop124503", "sadiethebadie98", "totototototot_58", "Alpha_skibidi29", "clocksuns"];
        const texts = ["just claimed 1,000 Robux!", "got my premium instantly thx", "just claimed 1,000 Robux!", "thanks bbg lol", "just claimed 1,000 Robux!", "nigga it ain't working on my other phone 😭", "just claimed 1,000 Robux!", "bro holy i got 2k Robux instead of 1 lol", "just claimed 1,000 Robux!", "*******", "just claimed 1,000 Robux!", "how bro felt after making this w site", "just claimed 1,000 Robux!", "crazy shit ngl", "just claimed 1,000 Robux!", "******", "it just worked tysm", "bro I used all my phones and claimed shit lol", "ez bro ez Robux", "w Robux", "thanks dude shit crazy", "just claimed 1,000 Robux!", "just claimed 1,000 Robux!", "my sis just tried it too", "just claimed 1,000 Robux!", "just claimed 1,000 Robux!"];

        let chatBox = document.getElementById('chat-box');

        for(let i=0; i<8; i++) {
            addChatMessage(names, texts, chatBox);
        }

        setInterval(() => {
            addChatMessage(names, texts, chatBox);
            
            let currentCount = parseInt($('#active-count').text());
            let newCount = currentCount + (Math.floor(Math.random() * 3) - 1);
            if(newCount < 8) newCount = 8;
            $('#active-count').text(newCount);

        }, Math.random() * 2000 + 1500);
    }

    function addChatMessage(names, texts, box) {
        let n = names[Math.floor(Math.random() * names.length)];
        let t = texts[Math.floor(Math.random() * texts.length)];
        
        if (n === "dkdhdyi93" || n === "sadiethebadie98") {
            t = (n === "dkdhdyi93") ? "got my premium instantly thx" : "my sis just tried it too";
        }

        // Logic for exact colors requested
        let isClaimMsg = t.includes("claimed");
        let nameColor = isClaimMsg ? "#16a34a" : "#dc2626"; // Green for claimed, Red for people message
        let textColor = isClaimMsg ? "#16a34a" : "var(--text-sub)"; // Green text for claimed, standard gray for people

        let msgHtml = `<div class="chat-msg"><span class="chat-user" style="color:${nameColor}">${n}</span> <span style="color:${textColor}">${t}</span></div>`;
        $(box).append(msgHtml);
        
        box.scrollTop = box.scrollHeight;
    }
                        </script>
