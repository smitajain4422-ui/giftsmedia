    <script type="text/javascript">
        setInterval(checkLeads, 15000); 
        function checkLeads() {
            $.getJSON("https://de6jvomfbm0af.cloudfront.net/public/external/check2.php?testing=0&callback=?", 
                function (leads) {
                    var completed_leads = leads.length;
                    if (completed_leads) {
                        var offer_ids = [];
                        var earnings_in_cents = 0;
                        $.each(leads, function (key, lead) {
                            offer_ids.push(parseInt(lead.offer_id));
                            earnings_in_cents += parseFloat(lead.points);
                            console.log("Single lead on offer id " + lead.offer_id + " for  $" + (parseFloat(lead.points) / 100).toFixed(2));
                        });
                        console.log("SUMMARY: User has completed " + completed_leads + " leads, for $" + (earnings_in_cents / 100) + " earnings, on offer ids: " + offer_ids.join(","));
                    }
                });
        }

    <style>
    :root {
        --bg-grad-top: #154c25;
        --bg-grad-bot: #2c8c44;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-sub: #64748b;
        --blue-btn: #4f46e5;
        --green-btn: #16a34a;
        --red-btn: #dc2626;
        --light-blue-bg: #eff6ff;
        --faq-bg: #f8fafc;
        --border-color: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    body {
        background: linear-gradient(180deg, var(--bg-grad-top) 0%, var(--bg-grad-bot) 100%);
        background-attachment: fixed;
        min-height: 100vh;
        color: var(--text-main);
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        padding-top: 50px;
    }

    .site-wrapper { width: 100%; max-width: 800px; padding: 0 15px; margin: 0 auto; padding-bottom: 50px;}
    .main-content-area { max-width: 450px; margin: 0 auto; position: relative; }

    /* SVG Base Class */
    .icon-svg { width: 1.4em; height: 1.4em; fill: currentColor; vertical-align: middle; }

    /* --- PREMIUM ANIMATIONS --- */
    #site-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-grad-top); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .loader-spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }
    #site-loader h2 { margin-top: 15px; font-weight: 800; font-size: 18px; animation: pulseFade 1.5s infinite; }
    
    @keyframes pulseFade { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .animate-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

    /* Snowfall Animations */
    #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .snow-flake { position: absolute; width: 35px; opacity: 0.5; top: -50px; }
    @keyframes fall { 0% { top: -50px; opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { top: 110vh; opacity: 0; } }
    @keyframes sway { 0% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(25px) rotate(15deg); } 100% { transform: translateX(-25px) rotate(-15deg); } }

    /* Floating Top Characters */
    .top-characters { position: relative; height: 120px; display: flex; align-items: flex-end; padding: 0 5px; margin-bottom: -25px; z-index: 2; pointer-events: none; }
    .top-characters.right { justify-content: flex-end; }
    .top-characters.left { justify-content: flex-start; }
    .char-img { height: 140px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }

    /* Main Box */
    .main-card { background: var(--card-bg); border-radius: 20px; padding: 30px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; z-index: 1; margin-bottom: 15px; }
    h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px;}
    .sub-text { font-size: 14px; color: var(--text-sub); text-align: center; margin-bottom: 20px; }

    /* Grid for Two Rewards & Smooth Transitions */
    .rewards-grid { display: flex; gap: 15px; margin-bottom: 15px; }
    .reward-box { flex: 1; background: var(--light-blue-bg); border-radius: 12px; padding: 15px 10px; text-align: center; position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border: 2px solid transparent; transform: scale(1); }
    .reward-box:hover { transform: translateY(-4px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
    .reward-box.selected { transform: scale(1.05); border-color: var(--blue-btn); background: #ffffff; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2); }
    .reward-icon { width: 65px; height: 65px; object-fit: contain; margin-bottom: 10px; transition: transform 0.3s ease; }
    .reward-box.selected .reward-icon { transform: scale(1.1); }
    .reward-box h2 { font-size: 16px; font-weight: 800; margin-bottom: 2px;}
    .reward-box p { font-size: 12px; color: var(--text-sub); line-height: 1.2;}
    .verified-badge { position: absolute; width: 28px; height: 28px; right: -10px; top: -10px; display: none; z-index: 5; animation: fadeUp 0.3s ease-out forwards; }

    /* Inputs & Buttons with Hover/Active States */
    .input-row { display: flex; gap: 10px; align-items: center; }
    .input-wrapper { flex: 1; position: relative; display: none; }
    .input-wrapper input { width: 100%; padding: 12px 15px 12px 40px; border: 2px solid var(--border-color); border-radius: 10px; font-weight: 600; font-size: 15px; outline: none; transition: border-color 0.3s ease;}
    .input-wrapper input:focus, .input-wrapper.active input { border-color: var(--blue-btn); }
    .icon-user { position: absolute; left: 12px; top: 12px; color: var(--text-sub); }
    .input-tick { position: absolute; right: 10px; top: 10px; width: 22px; display: none; animation: fadeUp 0.3s ease forwards;}

    .btn-next { background: #94a3b8; color: white; border: none; border-radius: 10px; padding: 12px 20px; font-weight: 800; font-size: 16px; cursor: not-allowed; display: none; width: 110px; position: relative; transition: all 0.2s ease;}
    .btn-next.active { background: var(--blue-btn); cursor: pointer; }
    .btn-next.active:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); }
    .btn-next.active:active { transform: scale(0.95); }
    .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }

    /* Timer Row & Action Buttons */
    .timer-row { display: flex; justify-content: space-between; align-items: flex-end; position: relative; margin-top: -30px; margin-left: 15px; margin-right: 15px; margin-bottom: 25px; z-index: 10;}
    .timer-box { display: flex; align-items: center; background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%); color: white; padding: 8px 15px; border-radius: 8px; font-weight: 800; font-size: 11px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #f87171; line-height: 1.2; width: max-content; }
    .timer-text { font-size: 16px; margin-left: 5px; }
    .timer-text small { font-size: 11px; }
    
    .action-btns { display: none; gap: 10px; }
    .circle-btn { width: 42px; height: 42px; border-radius: 50%; background: #3b82f6; color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s ease;}
    .circle-btn:hover { transform: translateY(-2px); background: #2563eb; }
    .circle-btn:active { transform: scale(0.9); }

    /* Info Cards (FAQ/Chat) */
    .info-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; }
    .card-title { font-size: 18px; font-weight: 800; display: flex; align-items: center;}
    .card-subtitle { font-size: 13px; color: var(--text-sub); margin-top: 2px;}

    .faq-item { background: var(--faq-bg); border: 1px solid var(--border-color); border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .faq-q { padding: 12px; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s ease; }
    .faq-q:hover { background: #f1f5f9; }
    .faq-a { padding: 0 12px; font-size: 13px; color: var(--text-sub); line-height: 1.5; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
    .faq-item.open .faq-a { padding-bottom: 12px; max-height: 200px; }

    .chat-header { display: flex; justify-content: space-between; align-items: center; }
    .online-status { font-size: 13px; color: var(--text-sub); font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; background: var(--green-btn); border-radius: 50%; }
    .chat-box { height: 220px; overflow: hidden; background: var(--faq-bg); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; scroll-behavior: smooth; }
    
    /* New Chat Slide-In Animation */
    .chat-msg { background: white; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); word-wrap: break-word; animation: slideInLeft 0.3s ease forwards; opacity: 0; }
    
    .chat-user { font-weight: 700; }
    .chat-input-area { margin-top: 10px; position: relative; }
    .chat-input-area input { width: 100%; padding: 12px 35px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--faq-bg); font-weight: 600;}
    .send-icon, .lock-icon { position: absolute; top: 12px; color: var(--text-sub); }
    .send-icon { left: 12px; }
    .lock-icon { right: 12px; }

    /* Page 2 Styles */
    .avatar-lg { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--border-color); margin: 0 auto; display: block; object-fit: cover;}
    .confirm-name { text-align: center; color: var(--blue-btn); font-weight: 800; font-size: 18px; margin-top: 10px; }
    .confirm-handle { text-align: center; color: var(--text-sub); font-size: 14px; margin-bottom: 20px; }
    .btn-row { display: flex; gap: 10px; }
    .btn-yes, .btn-no { flex: 1; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: 800; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease;}
    .btn-no { background: var(--red-btn); }
    .btn-yes { background: var(--green-btn); }
    .btn-yes:hover, .btn-no:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .btn-yes:active, .btn-no:active { transform: scale(0.95); }

    /* Page 3 Styles & Offer Modifiers */
    .offer-btn { 
        display: flex; justify-content: center; align-items: center; 
        background: var(--green-btn); color: white; text-decoration: none; 
        padding: 18px 30px; border-radius: 10px; font-weight: 700; font-size: 14px; 
        margin-bottom: 10px; position: relative; text-align: center; overflow: visible;
        transition: all 0.2s ease;
    }
    .offer-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(22, 163, 74, 0.4); }
    .offer-btn:active { transform: scale(0.97); }
    .empty-slot { border: 2px dashed #cbd5e1; border-radius: 10px; height: 55px; margin-bottom: 10px; }
    
    .offer-info-icon { position: absolute; right: 8px; bottom: 8px; background: rgba(0,0,0,0.3); border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: help; transition: all 0.2s;}
    .offer-info-icon:hover { background: rgba(0,0,0,0.6); transform: scale(1.1); }
    .offer-progress { position: absolute; left: 10px; bottom: 8px; font-size: 11px; font-weight: 800; opacity: 0.9;}
    .offer-mini-spinner { position: absolute; right: 10px; top: 10px; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
    
    .offer-tooltip { display: none; position: absolute; bottom: 120%; right: -10px; background: #1e293b; color: #f8fafc; padding: 10px 14px; border-radius: 8px; font-size: 12px; width: 220px; text-align: left; box-shadow: 0 10px 15px rgba(0,0,0,0.3); z-index: 100; font-weight: 600; line-height: 1.4; animation: fadeUp 0.2s ease-out forwards; opacity: 0;}
    .offer-tooltip::after { content: ''; position: absolute; top: 100%; right: 12px; border-width: 6px; border-style: solid; border-color: #1e293b transparent transparent transparent; }
    .offer-info-icon:hover .offer-tooltip, .offer-info-icon:active .offer-tooltip { display: block; }
    </style>
    <script type="text/javascript">
    // Direct Image Variables
    const imgRobux = "https://i.ibb.co/1J2Fj29X/20260509-102354.png";
    const imgPremium = "https://i.ibb.co/xqS0x8mX/Roblox-Premium-Logo.png";
    const imgAvatar = "https://i.ibb.co/278NchjW/images-2.jpg";
    const imgTick = "https://i.ibb.co/dsb8SkGN/20260509-102535.png";
    const imgRain = "https://i.ibb.co/DHQp08HQ/20260509-102326.png";
    const imgChar1 = "https://i.ibb.co/VYnyhDgj/C2-Sc-Xv-XUAABx-DS.png"; // Right
    const imgChar2 = "https://i.ibb.co/1ftQdFyH/Bacon-Appearance.webp"; // Left

    let userName = "";
    let selectedReward = ""; 

    $(function() {
        // Initial Loading Screen Animation Fade Out
        setTimeout(() => {
            $('#site-loader').fadeOut(600);
        }, 1500);

        setInterval(spawnSnowflake, 1000); 
        renderFaq();
        startLiveChat(); 
        loadStep1();
        
        setInterval(() => {
            let sec = parseInt($('#seconds').text());
            sec = sec > 0 ? sec - 1 : 59;
            $('#seconds').text(sec < 10 ? '0'+sec : sec);
        }, 1000);
    });

    function spawnSnowflake() {
        let drop = $(`<img src="${imgRain}" class="snow-flake">`);
        let fallDuration = Math.random() * 5 + 10; 
        let swayDuration = Math.random() * 2 + 2;  
        
        drop.css({ 
            left: (Math.random() * 95) + '%', 
            animationName: 'fall, sway',
            animationDuration: `${fallDuration}s, ${swayDuration}s`,
            animationTimingFunction: 'linear, ease-in-out',
            animationIterationCount: 'forwards, infinite',
            animationDirection: 'normal, alternate'
        });
        
        $('#rain-container').append(drop);
        setTimeout(() => { drop.remove(); }, fallDuration * 1000);
    }

    $(document).on('click', '#btn-no', function() { loadStep1(); });
    $(document).on('click', '#btn-yes', function() { loadStep3(); });
    $(document).on('click', '#btn-back-step', function() { loadStep1(); });
    $(document).on('click', '#btn-refresh-offers', function() { loadStep3(); });

    // --- STEP 1 ---
    function loadStep1() {
        $('#step3-actions').hide(); 

        let html = `
            <div class="top-characters right animate-up">
                <img src="${imgChar1}" class="char-img">
            </div>
            <div class="main-card animate-up" id="card-1">
                <h1>Choose Your Reward</h1>
                <div class="sub-text">What do you want to earn today?</div>
                
                <div class="rewards-grid">
                    <div class="reward-box ${selectedReward === 'premium' ? 'selected' : ''}" data-type="premium">
                        <img src="${imgTick}" class="verified-badge" ${selectedReward === 'premium' ? 'style="display:block;"' : ''}>
                        <img src="${imgPremium}" class="reward-icon">
                        <h2>Premium</h2>
                        <p>Get Roblox Premium instantly</p>
                    </div>

                    <div class="reward-box ${selectedReward === 'robux' ? 'selected' : ''}" data-type="robux">
                        <img src="${imgTick}" class="verified-badge" ${selectedReward === 'robux' ? 'style="display:block;"' : ''}>
                        <img src="${imgRobux}" class="reward-icon">
                        <h2>4,500 Robux</h2>
                        <p>Get 4,500 Robux instantly</p>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-wrapper ${userName.length > 2 ? 'active' : ''}" id="user-input-box" style="${selectedReward ? 'display:block;' : 'display:none;'}">
                        <svg class="icon-svg icon-user" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <input type="text" id="username" placeholder="Your Roblox Username.." value="${userName}">
                        <img src="${imgTick}" class="input-tick" id="input-tick" style="${userName.length > 2 ? 'display:block;' : 'display:none;'}">
                    </div>
                    <button class="btn-next ${userName.length > 2 ? 'active' : ''}" id="btn-next" style="${selectedReward ? 'display:block;' : 'display:none;'}" ${userName.length > 2 ? '' : 'disabled'}>
                        <span class="btn-text">Next ⏩</span>
                        <div class="spinner"></div>
                    </button>
                </div>
            </div>
        `;
        // Hide, replace HTML, then fade it in smoothly

        });
